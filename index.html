<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Meenakshi's Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #20b2aa 0%, #008b8b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 40px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
        }
        
        h1 {
            color: #333;
            font-size: 3em;
            margin-bottom: 10px;
            animation: fadeIn 1s ease-in;
        }
        
        .name {
            color: #20b2aa;
            font-weight: bold;
        }
        
        p {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .welcome-message {
            background: linear-gradient(135deg, #20b2aa 0%, #008b8b 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        
        button {
            background: linear-gradient(135deg, #20b2aa 0%, #008b8b 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.3s;
            margin: 10px;
        }
        
        button:hover {
            transform: scale(1.05);
        }
        
        .button-group {
            margin-top: 30px;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to <span class="name">Meenakshi</span>'s Homepage</h1>
        <p>Hello and welcome! 👋</p>
        
        <div class="welcome-message">
            <p>I'm delighted to have you visit my page. Feel free to explore and get to know more about my work and interests.</p>
        </div>
        
        <p>This is a beautiful welcome page created with modern HTML and CSS styling.</p>
        
        <div class="button-group">
            <button onclick="alert('Thanks for visiting Meenakshi\'s page!')">Welcome Alert</button>
            <a href="tourist-india.html" style="text-decoration: none;"><button>Explore India Tourism</button></a>
        </div>
    </div>
</body>
</html>
